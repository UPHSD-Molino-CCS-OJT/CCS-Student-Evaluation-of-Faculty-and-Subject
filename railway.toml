[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run build && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.healthcheckPath]]
path = "/api/health"

[deploy.healthcheckTimeout]
value = 300

# Railway Volume configuration
# Create volume in Railway dashboard: railway volume create signatures-storage --mount /data/uploads
# The volume will persist across deployments
[volumes]
mount_path = "/data/uploads"
