[build]
builder = "RAILPACK"
buildCommand = "COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts --ignore-platform-req=ext-gd --ignore-platform-req=ext-zip && (rm -rf node_modules/.cache || true) && npm install --include=dev --no-audit --no-fund && npm run build"

[deploy]
preDeployCommand = ["php artisan migrate --force"]
startCommand = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
